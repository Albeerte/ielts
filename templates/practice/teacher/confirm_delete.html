{% extends "base.html" %}

{% block title %}Delete{% endblock %}

{% block content %}
<section class="card" style="padding:24px; max-width:620px; margin:40px auto;">
  <h1 style="margin-top:0;">Delete {{ object }}</h1>
  <p class="muted">This cannot be undone.</p>
  <form method="post" class="action-row">
    {% csrf_token %}
    <button class="button" type="submit" style="background:#b91c1c;">Delete</button>
    <a class="button secondary" href="{{ cancel_url }}">Cancel</a>
  </form>
</section>
{% endblock %}
